# Local quality gate: runs before every commit (`pre-commit install`).
# Mirrors the CI checks so problems surface on your machine, not in CI.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check # lint, auto-fixing what it safely can
        args: [--fix]
      - id: ruff-format # format

  # mypy needs the project's own environment (torch type stubs), so run the
  # version installed in the Poetry venv rather than an isolated hook env.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: poetry run mypy
        language: system
        types: [python]
        pass_filenames: false
