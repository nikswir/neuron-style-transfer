name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
jobs:
  claude:
    # Two independent gates on WHO and on WHAT content:
    #   1. author_association — only owner / member / collaborator can trigger.
    #   2. fork check — never run over untrusted fork content, so the agent's
    #      quality-gate commands (pre-commit/pytest, which execute repo code)
    #      only ever touch trusted, same-repo content. issue_comment carries no
    #      fork field on PRs, so it is restricted to real issues instead
    #      (issue.pull_request == null); the PR-review events expose
    #      pull_request.head.repo.fork directly.
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request == null && contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && github.event.pull_request.head.repo.fork == false && contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && github.event.pull_request.head.repo.fork == false && contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # needed for `gh pr create` to open the PR
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          # gh CLI reads this token to open the PR (pull-requests: write above).
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read
          # Strict allowlist: install + the full pre-commit gate + opening a PR.
          # Deliberately NO `uv run python`/`uv run` catch-all — those execute
          # arbitrary code and would reopen the RCE surface we gate against.
          # After resolving an issue on a branch, open (never merge) a PR into
          # main; branch protection (1 approval + CI) stays the real gate.
          claude_args: |
            --allowed-tools "Bash(uv sync:*),Bash(uv run pre-commit run:*),Bash(uv run pytest:*),Bash(uv run ruff:*),Bash(uv run mypy:*),Bash(gh pr create:*)"
            --append-system-prompt "When you have committed and pushed a branch that resolves an issue, open a pull request into main with `gh pr create --base main --head <your-branch>`, giving it a clear title and a body that references the issue. Never merge the PR — leave review and merge to a human."
